services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MODEL_DIR=/app/model
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  dashboard:
    build:
      context: ./dashboard
    ports:
      - "3000:80"
    depends_on:
      - api

  simulator:
    build:
      context: ./simulator
    depends_on:
      api:
        condition: service_healthy
    environment:
      - API_URL=http://api:8000
      - RATE=2
      - ATTACK_RATIO=0.3
    command: ["python", "simulator.py", "--api-url", "http://api:8000", "--rate", "2", "--attack-ratio", "0.3"]
